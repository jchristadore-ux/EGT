<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EGT 2026 — First Annual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc80;
      --gold-dim: #8a6f30;
      --cream: #f5ede0;
      --dark: #0a0a08;
      --green-mid: #1a2e1c;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-base {
      background:
        radial-gradient(ellipse 140% 80% at 50% 110%, var(--green-mid) 0%, transparent 60%),
        radial-gradient(ellipse 80% 60% at 80% 0%, #0e1a10 0%, transparent 50%),
        linear-gradient(170deg, #07100a 0%, var(--dark) 40%, #080d08 100%);
    }

    .bg-grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.035;
      mix-blend-mode: overlay;
    }

    .bg-vignette {
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    .bg-lines {
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(255,255,255,0.008) 3px,
        rgba(255,255,255,0.008) 4px
      );
    }

    .deco-top, .deco-bottom {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 2;
      pointer-events: none;
    }
    .deco-top { top: 28px; }
    .deco-bottom { bottom: 28px; }

    .deco-line {
      background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
      height: 1px;
    }
    .deco-line-long { width: min(480px, 80vw); }
    .deco-line-short { width: min(240px, 40vw); }
    .deco-diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      opacity: 0.8;
    }

    .corner {
      position: fixed;
      width: 60px; height: 60px;
      z-index: 2;
      pointer-events: none;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 24px;
      width: 100%;
      max-width: 860px;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(9px, 1.5vw, 12px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 14px;
      animation: fadeIn 2s 0.3s ease both;
    }

    .title-egt {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(52px, 14vw, 130px);
      line-height: 0.9;
      letter-spacing: -0.01em;
      background: linear-gradient(160deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dim) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.25));
      animation: fadeIn 2s 0.5s ease both;
    }

    .title-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(16px, 3.5vw, 32px);
      color: rgba(245, 237, 224, 0.6);
      letter-spacing: 0.12em;
      margin-top: 6px;
      margin-bottom: 10px;
      animation: fadeIn 2s 0.7s ease both;
    }

    .gold-rule {
      width: min(360px, 70vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 18px auto;
      animation: ruleExpand 1.8s 1s ease both;
    }
    @keyframes ruleExpand {
      from { width: 0; opacity: 0; }
      to   { width: min(360px, 70vw); opacity: 1; }
    }

    .date-line {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: clamp(13px, 2.2vw, 19px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 40px;
      animation: fadeIn 2s 1.1s ease both;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(16px, 4vw, 48px);
      margin-bottom: 40px;
      animation: fadeIn 2s 1.3s ease both;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .unit-number {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(40px, 10vw, 88px);
      line-height: 1;
      color: var(--cream);
      text-shadow:
        0 0 60px rgba(201,168,76,0.3),
        0 2px 4px rgba(0,0,0,0.8);
      min-width: 2ch;
      text-align: center;
      transition: all 0.25s ease;
    }

    .unit-number.tick {
      animation: tick 0.25s ease;
    }

    @keyframes tick {
      0%   { transform: translateY(-6px); opacity: 0.5; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .unit-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      font-size: clamp(8px, 1.2vw, 10px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-top: 8px;
    }

    .unit-sep {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 70px);
      color: var(--gold-dim);
      opacity: 0.5;
      margin-top: 4px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 0.15; }
    }

    .location {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(13px, 2vw, 17px);
      letter-spacing: 0.15em;
      color: rgba(245, 237, 224, 0.4);
      animation: fadeIn 2s 1.6s ease both;
    }

    .countdown::after {
      content: '';
      position: absolute;
      width: 500px; height: 120px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .completed {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 54px);
      color: var(--gold-light);
      text-shadow: 0 0 40px rgba(201,168,76,0.5);
      letter-spacing: 0.06em;
      animation: fadeIn 1s ease both;
    }

    @media (max-height: 600px) {
      .title-egt { font-size: clamp(36px, 10vw, 72px); }
      .gold-rule { margin: 10px auto; }
      .countdown { margin-bottom: 20px; }
      .date-line { margin-bottom: 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer bg-base"></div>
  <div class="bg-layer bg-grain"></div>
  <div class="bg-layer bg-lines"></div>
  <div class="bg-layer bg-vignette"></div>

  <div class="corner corner-tl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
      <path d="M2 2 L14 2 M2 2 L2 14" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.9"/>
      <circle cx="2" cy="2" r="2" fill="#c9a84c" opacity="0.9"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
      <path d="M2 2 L14 2 M2 2 L2 14" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.9"/>
      <circle cx="2" cy="2" r="2" fill="#c9a84c" opacity="0.9"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
      <path d="M2 2 L14 2 M2 2 L2 14" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.9"/>
      <circle cx="2" cy="2" r="2" fill="#c9a84c" opacity="0.9"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 58 L2 2 L58 2" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.6"/>
      <path d="M2 2 L14 2 M2 2 L2 14" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.9"/>
      <circle cx="2" cy="2" r="2" fill="#c9a84c" opacity="0.9"/>
    </svg>
  </div>

  <div class="deco-top">
    <div class="deco-line deco-line-long"></div>
    <div class="deco-diamond"></div>
    <div class="deco-line deco-line-short"></div>
  </div>

  <div class="deco-bottom">
    <div class="deco-line deco-line-short"></div>
    <div class="deco-diamond"></div>
    <div class="deco-line deco-line-long"></div>
  </div>

  <div class="container">
    <p class="eyebrow">Crystal Springs Resort &nbsp;&middot;&nbsp; New Jersey</p>
    <h1 class="title-egt">EGT</h1>
    <p class="title-sub">First Annual</p>
    <div class="gold-rule"></div>
    <p class="date-line">July 20, 2026 &nbsp;&middot;&nbsp; First Tee 9:30 AM</p>

    <div class="countdown" id="countdown">
      <div class="unit">
        <div class="unit-number" id="days">--</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="unit-sep">&middot;</div>
      <div class="unit">
        <div class="unit-number" id="hours">--</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="unit-sep">&middot;</div>
      <div class="unit">
        <div class="unit-number" id="minutes">--</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="unit-sep">&middot;</div>
      <div class="unit">
        <div class="unit-number" id="seconds">--</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>

    <p class="location">Gather the crew &nbsp;&middot;&nbsp; Settle the scores &nbsp;&middot;&nbsp; Make history</p>
  </div>

  <script>
    const TARGET = new Date('2026-07-20T09:30:00-05:00').getTime();

    const els = {
      days:    document.getElementById('days'),
      hours:   document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };

    const prev = { days: null, hours: null, minutes: null, seconds: null };

    function pad(n) { return String(n).padStart(2, '0'); }

    function animateTick(el) {
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
    }

    function update() {
      const now  = Date.now();
      const diff = TARGET - now;

      if (diff <= 0) {
        document.getElementById('countdown').innerHTML =
          '<div class="completed">Tee Time Has Arrived</div>';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      const vals = { days: d, hours: h, minutes: m, seconds: s };

      for (const key in vals) {
        const str = key === 'days' ? String(vals[key]) : pad(vals[key]);
        if (str !== prev[key]) {
          els[key].textContent = str;
          animateTick(els[key]);
          prev[key] = str;
        }
      }
    }

    update();
    setInterval(update, 1000);
  </script>

</body>
</html>
